<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a2f2a" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#fef9e6" media="(prefers-color-scheme: light)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kerama Islands">
    <link rel="apple-touch-icon" href="icons/icon-192.jpg">
    <link rel="manifest" href="manifest.json">
    <title>Kerama Islands Guide</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s;
        }

        :root {
            --bg-body: #0a0f1a;
            --bg-surface: #1e2a2a;
            --card-bg: #2a3b3b;
            --text-primary: #f0f9f4;
            --text-secondary: #cbd5e1;
            --border: #3e5a5a;
            --accent: #ffb347;
            --accent-glow: #ff9f4a;
            --gradient-title: linear-gradient(135deg, #FFD166, #FF9F4A, #FF6B6B);
            --shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        body.light-mode {
            --bg-body: #fef9e6;
            --bg-surface: #ffffff;
            --card-bg: #fff6ed;
            --text-primary: #1e2a2a;
            --text-secondary: #2d4a4a;
            --border: #ffddb0;
            --shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.5;
            padding: 0;
            margin: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.2rem 1.5rem 2rem;
        }

        /* header */
        .app-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .title-gradient {
            background: var(--gradient-title);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 1rem;
        }

        button {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: transform 0.1s, background 0.2s;
        }

        button:active {
            transform: scale(0.96);
        }

        button.active-lang {
            background: var(--accent);
            color: #1e2a2a;
            border-color: var(--accent);
        }

        .mode-toggle {
            background: var(--card-bg);
        }

        /* cards & layout */
        .island-grid {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
            margin: 2rem 0;
        }

        .island-card {
            background: var(--card-bg);
            border-radius: 2rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        @media (min-width: 640px) {
            .island-card {
                flex-direction: row;
            }
            .card-img {
                width: 200px;
                height: auto;
            }
        }

        .card-img {
            background: #2f4f4f;
            object-fit: cover;
            width: 100%;
            height: 180px;
        }

        .card-content {
            padding: 1.2rem 1.5rem;
            flex: 1;
        }

        .card-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .beach-list {
            font-size: 0.9rem;
            color: var(--accent);
            margin-bottom: 0.8rem;
        }

        .detail-btn {
            background: var(--accent);
            color: #1a2a2a;
            border: none;
            margin-top: 0.8rem;
            font-weight: bold;
        }

        /* スポンサーエリア - アイコンサイズに統一 */
        .sponsor-area {
            margin: 1.5rem 0;
            text-align: center;
        }

        .sponsor-link {
            display: inline-block;
            transition: transform 0.2s ease, opacity 0.2s;
            text-decoration: none;
        }

        .sponsor-link:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .sponsor-img {
            display: block;
            width: 80px;          /* アイコンサイズ */
            height: 80px;
            border-radius: 50%;    /* 丸形アイコン風 */
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* 地図はフル幅・角丸 */
        .map-wrapper {
            margin: 2rem 0 1rem;
            border-radius: 1.5rem;
            overflow: hidden;
            background: var(--bg-surface);
            line-height: 0;
        }

        .map-img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 1.5rem;
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            padding: 1.5rem 0 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .back-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .detail-section {
            background: var(--card-bg);
            border-radius: 2rem;
            padding: 1.8rem;
            margin-bottom: 1.5rem;
        }

        .detail-section h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            border-left: 5px solid var(--accent);
            padding-left: 0.8rem;
        }

        .detail-text {
            white-space: pre-line;
            line-height: 1.6;
        }

        .official-link {
            display: inline-block;
            margin-top: 0.8rem;
            background: var(--accent);
            color: #1e2a2a;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            text-decoration: none;
            font-weight: bold;
        }

        hr {
            border-color: var(--border);
            margin: 1rem 0;
        }

        .island-hero-img {
            width: 100%;
            max-height: 280px;
            object-fit: cover;
            border-radius: 1.5rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 480px) {
            .container {
                padding: 1rem;
            }
            .title-gradient {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

        // ========================================================================

        // Island data (detailed descriptions per lang)
        const islandsData = {
            tokashiki: {
                id: "tokashiki",
                name_jp: "渡嘉敷島",
                beaches: "Aharen Beach, Tokashiku Beach",
                imgPlaceholder: "https://placehold.co/800x400/2f6b47/white?text=Tokashiki+Island",
                details: {
                    en: "🚲 Transportation: Shuttle bus from port to Aharen Beach (¥400), bicycle/scooter rentals (¥1500~/day). Taxi available.\n🏄 Rental shops: Snorkel gear, kayaks, beach umbrellas at Aharen Beach.\n🍜 Local shops: Small grocery near port & souvenir shops.\n🍽️ Restaurants: Seaside cafes serving Okinawa soba, fresh seafood bowls.\n🏠 Accommodation: Guesthouse 'Kerama Blue', beach bungalows, camping at Tokashiku Beach.",
                    it: "🚲 Trasporti: Navetta dal porto ad Aharen Beach (¥400), noleggio bici/scooter (¥1500~/giorno). Taxi disponibile.\n🏄 Noleggio: Attrezzatura snorkeling, kayak, ombrelloni.\n🍜 Negozi: Piccolo market vicino al porto.\n🍽️ Ristoranti: Café sul mare con soba di Okinawa e pesce fresco.\n🏠 Alloggi: Guesthouse 'Kerama Blue', bungalow, campeggio a Tokashiku Beach.",
                    ru: "🚲 Транспорт: Шатл от порта до пляжа Ахарен (¥400), аренда велосипедов/скутеров (¥1500/день). Такси.\n🏄 Прокат: Снаряжение для снорклинга, каяки.\n🍜 Местные магазины: Небольшой магазин у порта.\n🍽️ Рестораны: Кафе с местной лапшой и морепродуктами.\n🏠 Проживание: Гостевой дом, бунгало, кемпинг.",
                    ja: "🚲 交通: 阿波連ビーチ行きシャトルバス（¥400）、レンタサイクル/スクーター（¥1500〜）。タクシーあり。\n🏄 レンタル: シュノーケル、カヤック、ビーチパラソル。\n🍜 地元のお店: 港近くの小さな商店。\n🍽️ 食堂: 海鮮丼、沖縄そばのお店。\n🏠 宿泊: ゲストハウス「ケラマブルー」、バンガロー、渡嘉志久ビーチキャンプ。"
                },
                officialUrl: "https://www.vill.tokashiki.okinawa.jp/" 
            },
            aka: {

                name_jp: "阿嘉島",
                beaches: "Nishihama Beach",
                imgPlaceholder: "https://placehold.co/800x400/2f6b47/white?text=Aka+Island+Nishihama",
                details: {
                    en: "🚲 Transportation: Rent a bicycle (¥1000/day) or walk; island is small. No buses.\n🏄 Rental shops: Snorkel & marine sports rental near Nishihama Beach.\n🍜 Local shops: 'Aka Market' for drinks & snacks, small souvenir shop.\n🍽️ Restaurants: 'Marine House' Okinawan cuisine, sunset cafe.\n🏠 Accommodation: minshuku 'Aka Island Guesthouse', seafront lodges.",
                    it: "🚲 Trasporti: Noleggio biciclette (¥1000/giorno) o a piedi. L'isola è piccola.\n🏄 Noleggio: Snorkel e attrezzatura sportiva vicino a Nishihama Beach.\n🍜 Negozi: 'Aka Market' snack e souvenir.\n🍽️ Ristoranti: Cucina tradizionale, caffetteria al tramonto.\n🏠 Alloggi: Minshuku, lodge sul mare.",
                    ru: "🚲 Транспорт: Аренда велосипеда (¥1000/день) или пешком. Остров небольшой.\n🏄 Прокат: Снорклинг и снаряжение возле пляжа Нишихама.\n🍜 Местные магазины: 'Aka Market', сувениры.\n🍽️ Рестораны: Окинавская кухня, кафе на закате.\n🏠 Проживание: Миншуку, гостевые дома у моря.",

        let currentLang = localStorage.getItem("appLang") || "en";
        let currentTheme = localStorage.getItem("appTheme") || "dark";
        let currentView = "home";
        let selectedIslandId = null;

        function setTheme(theme) {
            if (theme === "light") {
                document.body.classList.add("light-mode");
            } else {
                document.body.classList.remove("light-mode");
            }
            currentTheme = theme;
            localStorage.setItem("appTheme", theme);
        }

        function toggleTheme() {
            setTheme(currentTheme === "dark" ? "light" : "dark");
            render();
        }

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem("appLang", lang);
            render();
        }

        function render() {
            if (currentView === "home") renderHome();
            else if (currentView === "detail" && selectedIslandId) renderDetail(selectedIslandId);
        }

        function navigateHome() {
            currentView = "home";
            selectedIslandId = null;
            window.history.pushState({ view: "home" }, "", window.location.pathname);
            render();
        }

        function navigateToDetail(islandId) {
            currentView = "detail";
            selectedIslandId = islandId;
            window.history.pushState({ view: "detail", islandId }, "", window.location.pathname);
            render();
        }

        function renderHome() {
            const t = translations[currentLang];
            const appRoot = document.getElementById("appRoot");
            const islandEntries = [
                { id: "tokashiki", name: "Tokashiki Island", jpname: "渡嘉敷島", beaches: "Aharen Beach, Tokashiku Beach", img: islandsData.tokashiki.imgPlaceholder },

                { code: "ja", flag: "🇯🇵", label: "JA" }
            ];
            const html = `
                <div class="app-header">
                    <h1 class="title-gradient">${t.app_title}</h1>
                    <div class="controls">

                    </div>
                </div>
                <div class="ferry-card" style="background:var(--card-bg); border-radius:1.5rem; padding:1rem; margin-bottom:1rem;">
                    <p>✈️ ${t.ferry_info}</p>
                    <p style="font-size:0.85rem; margin-top:0.5rem;">⏱️ ${t.ferry_schedule_note}</p>
                </div>
                <!-- ★ 地図をここに移動（交通案内の直後、島リストの前） -->
                <div class="map-wrapper">
                    <img class="map-img" src="${mapImageUrl}" alt="${t.map_alt}" onerror="this.src='${defaultMapImage}'">
                </div>
                <!-- 上部スポンサー枠（アイコンサイズ・丸形） -->
                <div class="sponsor-area" id="sponsorTop">
                    <a href="${sponsorTopUrl}" target="_blank" rel="noopener noreferrer" class="sponsor-link">
                        <img class="sponsor-img" src="${sponsorTopImage}" alt="Sponsor" onerror="this.style.display='none'">
                    </a>
                </div>
                <h2 style="margin: 1rem 0 0.5rem;">🏝️ ${t.to_islands}</h2>
                <div class="island-grid" id="islandList">
                    ${islandEntries.map(island => `
                        <div class="island-card">
                            <img class="card-img" src="${island.img}" alt="${island.name}" onerror="this.src='https://placehold.co/600x400/2f6b47/white?text=Island+Photo'">
                            <div class="card-content">
                                <div class="card-title">${island.name} (${island.jpname})</div>
                                <div class="beach-list">🏖️ ${island.beaches}</div>
                                <button class="detail-btn" data-id="${island.id}">🔍 View Details</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <!-- 下部スポンサー枠（アイコンサイズ・丸形） -->
                <div class="sponsor-area" id="sponsorBottom">
                    <a href="${sponsorBottomUrl}" target="_blank" rel="noopener noreferrer" class="sponsor-link">
                        <img class="sponsor-img" src="${sponsorBottomImage}" alt="Sponsor" onerror="this.style.display='none'">
                    </a>
                </div>
                <div class="footer">
                    <p><strong>${t.contact}</strong><br><a href="mailto:mementomorikatsu@gmail.com">${t.email}</a></p>
                </div>
            `;
            appRoot.innerHTML = html;
            // attach event listeners
            document.querySelectorAll("[data-lang]").forEach(btn => {
                btn.addEventListener("click", (e) => setLanguage(btn.getAttribute("data-lang")));
            });
            document.getElementById("darkmodeToggleBtn")?.addEventListener("click", toggleTheme);
            document.querySelectorAll(".detail-btn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const id = btn.getAttribute("data-id");
                    if (id) navigateToDetail(id);
                });
            });
        }

        function renderDetail(islandId) {
            const island = islandsData[islandId];
            if (!island) return navigateHome();
            const t = translations[currentLang];
            const detailText = island.details[currentLang] || island.details.en;
            const islandNameDisplay = `${island.name_jp} / ${islandId.charAt(0).toUpperCase() + islandId.slice(1)} Island`;
            const langButtons = [
                { code: "en", flag: "🇬🇧", label: "EN" },
                { code: "it", flag: "🇮🇹", label: "IT" },
                { code: "ru", flag: "🇷🇺", label: "RU" },
                { code: "ja", flag: "🇯🇵", label: "JA" }
            ];
            const html = `
                <div class="app-header">
                    <h1 class="title-gradient">${t.app_title}</h1>
                    <div class="controls">
                        ${langButtons.map(lang => `<button class="${currentLang === lang.code ? 'active-lang' : ''}" data-lang="${lang.code}">${lang.flag} ${lang.label}</button>`).join('')}
                        <button class="mode-toggle" id="darkmodeToggleBtnDetail">${currentTheme === 'dark' ? '☀️ Light Mode' : '🌙 Dark Mode'}</button>
                    </div>
                </div>
                <div class="back-buttons">
                    <button id="backToMainBtn">← ${t.back_home}</button>
                    <button id="backHistoryBtn">↺ ${t.back_prev}</button>
                </div>
                <div class="detail-section">
                    <img class="island-hero-img" src="${island.imgPlaceholder}" alt="${islandId}" onerror="this.src='https://placehold.co/800x400/2f6b47/white?text=Island+View'">
                    <h2>🏝️ ${islandNameDisplay}</h2>
                    <p><strong>🏖️ ${t.common_beaches}:</strong> ${island.beaches}</p>
                    <div class="detail-text">
                        <h3>🚲 ${t.transport_info}</h3>
                        <p>${detailText.split('\n').filter(p => p.includes('Transportation') || p.includes('Trasporti') || p.includes('Транспорт') || p.includes('交通')).join('\n') || detailText}</p>
                        <h3>🏄 ${t.shops_restaurants}</h3>
                        <p>${detailText.split('\n').filter(p => p.includes('Rental') || p.includes('Noleggio')|| p.includes('レンタル')|| p.includes('shop')|| p.includes('お店')).join('\n') || detailText}</p>
                        <h3>🏠 ${t.accommodations}</h3>
                        <p>${detailText.split('\n').filter(p => p.includes('Accommodation')|| p.includes('Alloggi')|| p.includes('宿泊')|| p.includes('Проживание')).join('\n') || detailText}</p>
                    </div>
                    <a class="official-link" href="${island.officialUrl}" target="_blank" rel="noopener noreferrer">🔗 ${t.official_website}</a>
                    <hr>
                    <p style="font-size:0.9rem;">※ ${t.ferry_schedule_note}<br>※1. 天候に左右されます。晴れた日に行きましょう。<br>※2. コンビニはありませんが地元のお店あります。</p>
                </div>
                <div class="footer">
                    <p><strong>${t.contact}</strong><br><a href="mailto:mementomorikatsu@gmail.com">${t.email}</a></p>
                </div>
            `;
            document.getElementById("appRoot").innerHTML = html;
            document.querySelectorAll("[data-lang]").forEach(btn => {
                btn.addEventListener("click", (e) => setLanguage(btn.getAttribute("data-lang")));
            });
            document.getElementById("darkmodeToggleBtnDetail")?.addEventListener("click", toggleTheme);
            document.getElementById("backToMainBtn")?.addEventListener("click", navigateHome);
            document.getElementById("backHistoryBtn")?.addEventListener("click", () => { window.history.back(); });
        }

        // Handle popstate
        window.addEventListener("popstate", (event) => {
            const state = event.state;
            if (state && state.view === "detail" && state.islandId) {
                currentView = "detail";
                selectedIslandId = state.islandId;
                renderDetail(selectedIslandId);
            } else {
                currentView = "home";
                selectedIslandId = null;
                renderHome();
            }
        });

        // initial load
        setTheme(currentTheme);
        renderHome();

        // register service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('SW registered: ', reg);
                }).catch(err => console.log('SW failed: ', err));
            });
        }
    </script>
</body>
</html>

<html lang="en">

    <title>Kerama Islands Guide</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s;
        }

        :root {
            --bg-body: #0a0f1a;
            --bg-surface: #1e2a2a;
            --card-bg: #2a3b3b;
            --text-primary: #f0f9f4;
            --text-secondary: #cbd5e1;
            --border: #3e5a5a;
            --accent: #ffb347;
            --accent-glow: #ff9f4a;
            --gradient-title: linear-gradient(135deg, #FFD166, #FF9F4A, #FF6B6B);
            --shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        body.light-mode {
            --bg-body: #fef9e6;
            --bg-surface: #ffffff;
            --card-bg: #fff6ed;
            --text-primary: #1e2a2a;
            --text-secondary: #2d4a4a;
            --border: #ffddb0;
            --shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.5;
            padding: 0;
            margin: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.2rem 1.5rem 2rem;
        }

        /* header */
        .app-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .title-gradient {
            background: var(--gradient-title);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 1rem;
        }

        button {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: transform 0.1s, background 0.2s;
        }

        button:active {
            transform: scale(0.96);
        }

        button.active-lang {
            background: var(--accent);
            color: #1e2a2a;
            border-color: var(--accent);
        }

        .mode-toggle {
            background: var(--card-bg);
        }

        /* cards & layout */
        .island-grid {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
            margin: 2rem 0;
        }

        .island-card {
            background: var(--card-bg);
            border-radius: 2rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        @media (min-width: 640px) {
            .island-card {
                flex-direction: row;
            }
            .card-img {
                width: 200px;
                height: auto;
            }
        }

        .card-img {
            background: #2f4f4f;
            object-fit: cover;
            width: 100%;
            height: 180px;
        }

        .card-content {
            padding: 1.2rem 1.5rem;
            flex: 1;
        }

        .card-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .beach-list {
            font-size: 0.9rem;
            color: var(--accent);
            margin-bottom: 0.8rem;
        }

        .detail-btn {
            background: var(--accent);
            color: #1a2a2a;
            border: none;
            margin-top: 0.8rem;
            font-weight: bold;
        }

        /* スポンサーエリア - アイコンサイズに統一 */
        .sponsor-area {
            margin: 1.5rem 0;
            text-align: center;
        }

        .sponsor-link {
            display: inline-block;
            transition: transform 0.2s ease, opacity 0.2s;
            text-decoration: none;
        }

        .sponsor-link:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .sponsor-img {
            display: block;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* 追加：座間味島の下に表示する特別なマップ画像スタイル */
        .extra-map-wrapper {
            margin: 0.5rem 0 0.8rem;
            border-radius: 1.5rem;
            overflow: hidden;
            background: var(--bg-surface);
            line-height: 0;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .extra-map-img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 1.5rem;
            transition: transform 0.2s ease;
        }

        /* 地図はフル幅・角丸 */
        .map-wrapper {
            margin: 2rem 0 1rem;
            border-radius: 1.5rem;
            overflow: hidden;
            background: var(--bg-surface);
            line-height: 0;
        }

        .map-img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 1.5rem;
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            padding: 1.5rem 0 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .back-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .detail-section {
            background: var(--card-bg);
            border-radius: 2rem;
            padding: 1.8rem;
            margin-bottom: 1.5rem;
        }

        .detail-section h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            border-left: 5px solid var(--accent);
            padding-left: 0.8rem;
        }

        .detail-text {
            white-space: pre-line;
            line-height: 1.6;
        }

        .official-link {
            display: inline-block;
            margin-top: 0.8rem;
            background: var(--accent);
            color: #1e2a2a;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            text-decoration: none;
            font-weight: bold;
        }

        hr {
            border-color: var(--border);
            margin: 1rem 0;
        }

        .island-hero-img {
            width: 100%;
            max-height: 280px;
            object-fit: cover;
            border-radius: 1.5rem;
            margin-bottom: 1rem;
        }

        .ferry-card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .ferry-item {
            background: var(--bg-surface);
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin-bottom: 1rem;
            border-left: 4px solid var(--accent);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .ferry-item:hover {
            transform: translateX(5px);
        }
        .ferry-title {
            font-size: 1.3rem;
            font-weight: bold;
        }

        @media (max-width: 480px) {
            .container {
                padding: 1rem;
            }
            .title-gradient {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

                    ja: "🚲 交通: 古座間味・阿真ビーチ行きシャトルバス、電動レンタサイクル（¥2000/日）\n🏄 レンタル: シュノーケル、スタンドアップパドル、ビーチ用品。\n🍜 地元のお店: 港近くの商店（コンビニはありませんが日用雑貨あり）\n🍽️ 食堂: 地魚料理「座間味食堂」、カフェ「きゃんぱる」\n🏠 宿泊: ホテルケラマミヤヒラ、ゲストハウス、グランピング。"
                },
                officialUrl: "https://www.zamamitourism.com/"
            }
        };

        // ----- 航路データ（追加）-----
        const ferryData = {
            zamami_aka: {
                titleKey: "zamami_aka_title",
                descKey: "zamami_aka_desc",
                timetable: {
                    summer: "【夏季（3月～10月）】\n1便: 座間味 7:45 → 阿嘉 8:00\n2便: 座間味 11:45 → 阿嘉 12:00\n3便: 座間味 14:30 → 阿嘉 14:45\n4便: 座間味 17:30 → 阿嘉 17:45\n※阿嘉発は到着後すぐ折り返し（時刻はほぼ同じ）",
                    winter: "【冬季（11月～2月）】\n1便: 座間味 7:45 → 阿嘉 8:00\n2便: 座間味 11:45 → 阿嘉 12:00\n3便: 座間味 14:30 → 阿嘉 14:45\n4便: 座間味 17:20 → 阿嘉 17:35"
                },
                fare: "座間味港 ⇔ 阿嘉港: 大人500円 / 子供250円（片道）※環境協力税別途100円",
                reservation: "座間味～阿嘉区間は予約不要。そのまま窓口で乗船券購入。\n阿波連港（渡嘉敷島）行きは要予約（098-987-2614）",
                officialUrl: "https://www.vill.zamami.okinawa.jp/sempaku/mitsushima/"
            },
            kerama_route: {
                titleKey: "kerama_route_title",
                descKey: "kerama_route_desc",
                timetable: {
                    summer: "【運行例】要予約のオンデマンド運航\n座間味発 8:30 → 阿嘉発 8:45 → 阿波連着 9:05\n阿波連発 9:05 → 阿嘉着 9:25 → 座間味着 9:40\n\n座間味発 15:30 → 阿嘉発 15:45 → 阿波連着 16:05\n阿波連発 16:05 → 阿嘉着 16:25 → 座間味着 16:40",
                    winter: "冬季もほぼ同じ時刻で運行（要確認）。前日17:00までの予約が必要。"
                },
                fare: "渡嘉敷島（阿波連港）～座間味島・阿嘉島間: 片道 約800円（予約時要確認）",
                reservation: "完全予約制（予約がない場合は運航しません）\n予約先: 座間味村役場 船舶・観光課 TEL: 098-987-2614\n受付時間: 8:30～17:00（利用希望日の前日17:00まで）",
                officialUrl: "https://www.vill.zamami.okinawa.jp/sempaku/"
            }
        };

        // Global state
        let currentLang = localStorage.getItem("appLang") || "en";
        let currentTheme = localStorage.getItem("appTheme") || "dark";
        let currentView = "home";            // home, island_detail, ferry_list, ferry_detail
        let selectedIslandId = null;
        let selectedFerryId = null;           // zamami_aka or kerama_route

        function setTheme(theme) {
            if (theme === "light") document.body.classList.add("light-mode");
            else document.body.classList.remove("light-mode");
            currentTheme = theme;
            localStorage.setItem("appTheme", theme);
        }

        function toggleTheme() {
            setTheme(currentTheme === "dark" ? "light" : "dark");
            render();
        }

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem("appLang", lang);
            render();
        }

        function getSafeImageUrl(originalPath, defaultPath = defaultSponsorImage) {
            if (!originalPath) return defaultPath;
            if (originalPath.startsWith('http://') || originalPath.startsWith('https://')) return originalPath;
            try {
                const parts = originalPath.split('/');
                const encodedParts = parts.map(part => encodeURIComponent(part));
                return encodedParts.join('/');
            } catch(e) {
                return defaultPath;
            }
        }

        // Navigation
        function navigateHome() {
            currentView = "home";
            selectedIslandId = null;
            selectedFerryId = null;
            window.history.pushState({ view: "home" }, "", window.location.pathname);
            render();
        }

        function navigateToIslandDetail(islandId) {
            currentView = "island_detail";
            selectedIslandId = islandId;
            window.history.pushState({ view: "island_detail", islandId }, "", window.location.pathname);
            render();
        }

        function navigateToFerryList() {
            currentView = "ferry_list";
            selectedFerryId = null;
            window.history.pushState({ view: "ferry_list" }, "", window.location.pathname);
            render();
        }

        function navigateToFerryDetail(ferryId) {
            currentView = "ferry_detail";
            selectedFerryId = ferryId;
            window.history.pushState({ view: "ferry_detail", ferryId }, "", window.location.pathname);
            render();
        }

        function render() {
            if (currentView === "home") renderHome();
            else if (currentView === "island_detail" && selectedIslandId) renderIslandDetail(selectedIslandId);
            else if (currentView === "ferry_list") renderFerryList();
            else if (currentView === "ferry_detail" && selectedFerryId) renderFerryDetail(selectedFerryId);
            else renderHome();
        }

        // ---------- メインページ（3島＋新セクション）----------
        function renderHome() {
            const t = translations[currentLang];
            const islandEntries = [
                { id: "tokashiki", name: "Tokashiki Island", jpname: "渡嘉敷島", beaches: "Aharen Beach, Tokashiku Beach", img: islandsData.tokashiki.imgPlaceholder },
                { id: "aka", name: "Aka Island", jpname: "阿嘉島", beaches: "Nishihama Beach", img: islandsData.aka.imgPlaceholder },
                { id: "zamami", name: "Zamami Island", jpname: "座間味島", beaches: "Ama Beach, Furuzamami Beach", img: islandsData.zamami.imgPlaceholder }
            ];
            const langButtons = [
                { code: "en", flag: "🇬🇧", label: "EN" },
                { code: "it", flag: "🇮🇹", label: "IT" },
                { code: "ru", flag: "🇷🇺", label: "RU" },
                { code: "ja", flag: "🇯🇵", label: "JA" }
            ];
            const safeMapUrl = getSafeImageUrl(mapImageUrl, defaultMapImage);
            const safeSponsorTopImg = getSafeImageUrl(sponsorTopImage);
            const safeSponsorBottomImg = getSafeImageUrl(sponsorBottomImage);
            const safeExtraMapImg = getSafeImageUrl(extraMapImageUrl, defaultExtraMapImage);

            let islandsHtmlArray = [];
            islandEntries.forEach((island, idx) => {
                islandsHtmlArray.push(`
                    <div class="island-card">
                        <img class="card-img" src="${island.img}" alt="${island.name}" onerror="this.src='https://placehold.co/600x400/2f6b47/white?text=Island+Photo'">
                        <div class="card-content">
                            <div class="card-title">${island.name} (${island.jpname})</div>
                            <div class="beach-list">🏖️ ${island.beaches}</div>
                            <button class="detail-btn" data-id="${island.id}">🔍 View Details</button>
                        </div>
                    </div>
                `);
                if (island.id === "zamami") {
                    islandsHtmlArray.push(`
                        <div class="extra-map-wrapper">
                            <img class="extra-map-img" src="${safeExtraMapImg}" alt="${t.extra_map_caption || 'Additional Kerama Map'}" 
                                 onerror="this.src='${defaultExtraMapImage}'; this.onerror=null;">
                        </div>
                    `);
                }
            });

            const html = `
                <div class="app-header">
                    <h1 class="title-gradient">${t.app_title}</h1>
                    <div class="controls">
                        ${langButtons.map(lang => `<button class="${currentLang === lang.code ? 'active-lang' : ''}" data-lang="${lang.code}">${lang.flag} ${lang.label}</button>`).join('')}
                        <button class="mode-toggle" id="darkmodeToggleBtn">${currentTheme === 'dark' ? '☀️ Light Mode' : '🌙 Dark Mode'}</button>
                    </div>
                </div>
                <div class="ferry-card">
                    <p>✈️ ${t.ferry_info}</p>
                    <p style="font-size:0.85rem; margin-top:0.5rem;">⏱️ ${t.ferry_schedule_note}</p>
                </div>
                <div class="map-wrapper">
                    <img class="map-img" src="${safeMapUrl}" alt="${t.map_alt}" onerror="this.src='${defaultMapImage}'">
                </div>
                <div class="sponsor-area">
                    <a href="${sponsorTopUrl}" target="_blank" rel="noopener noreferrer" class="sponsor-link">
                        <img class="sponsor-img" src="${safeSponsorTopImg}" alt="Sponsor" onerror="this.src='${defaultSponsorImage}'; this.onerror=null;">
                    </a>
                </div>
                <h2 style="margin: 1rem 0 0.5rem;">🏝️ ${t.to_islands}</h2>
                <div class="island-grid" id="islandList">
                    ${islandsHtmlArray.join('')}
                </div>
                <!-- 追加: 3島間の移動ボタン -->
                <div style="text-align: center; margin: 1rem 0 1.5rem;">
                    <button id="interIslandBtn" style="background: var(--accent); color: #1e2a2a; font-size: 1.2rem; padding: 0.7rem 1.5rem;">🚢 ${t.inter_island_ferries}</button>
                </div>
                <div class="sponsor-area">
                    <a href="${sponsorBottomUrl}" target="_blank" rel="noopener noreferrer" class="sponsor-link">
                        <img class="sponsor-img" src="${safeSponsorBottomImg}" alt="Sponsor" onerror="this.src='${defaultSponsorImage}'; this.onerror=null;">
                    </a>
                </div>
                <div class="footer">
                    <p><strong>${t.contact}</strong><br><a href="mailto:mementomorikatsu@gmail.com">${t.email}</a></p>
                </div>
            `;
            document.getElementById("appRoot").innerHTML = html;
            document.querySelectorAll("[data-lang]").forEach(btn => {
                btn.addEventListener("click", (e) => setLanguage(btn.getAttribute("data-lang")));
            });
            document.getElementById("darkmodeToggleBtn")?.addEventListener("click", toggleTheme);
            document.querySelectorAll(".detail-btn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const id = btn.getAttribute("data-id");
                    if (id) navigateToIslandDetail(id);
                });
            });
            document.getElementById("interIslandBtn")?.addEventListener("click", navigateToFerryList);
        }

        // 島の詳細（従来通り）
        function renderIslandDetail(islandId) {
            const island = islandsData[islandId];
            if (!island) return navigateHome();
            const t = translations[currentLang];
            const detailText = island.details[currentLang] || island.details.en;
            const islandNameDisplay = `${island.name_jp} / ${islandId.charAt(0).toUpperCase() + islandId.slice(1)} Island`;
            const langButtons = [
                { code: "en", flag: "🇬🇧", label: "EN" },
                { code: "it", flag: "🇮🇹", label: "IT" },
                { code: "ru", flag: "🇷🇺", label: "RU" },
                { code: "ja", flag: "🇯🇵", label: "JA" }
            ];
            const html = `
                <div class="app-header">
                    <h1 class="title-gradient">${t.app_title}</h1>
                    <div class="controls">
                        ${langButtons.map(lang => `<button class="${currentLang === lang.code ? 'active-lang' : ''}" data-lang="${lang.code}">${lang.flag} ${lang.label}</button>`).join('')}
                        <button class="mode-toggle" id="darkmodeToggleBtnDetail">${currentTheme === 'dark' ? '☀️ Light Mode' : '🌙 Dark Mode'}</button>
                    </div>
                </div>
                <div class="back-buttons">
                    <button id="backToMainBtn">← ${t.back_home}</button>
                    <button id="backHistoryBtn">↺ ${t.back_prev}</button>
                </div>
                <div class="detail-section">
                    <img class="island-hero-img" src="${island.imgPlaceholder}" alt="${islandId}" onerror="this.src='https://placehold.co/800x400/2f6b47/white?text=Island+View'">
                    <h2>🏝️ ${islandNameDisplay}</h2>
                    <p><strong>🏖️ ${t.common_beaches}:</strong> ${island.beaches}</p>
                    <div class="detail-text">
                        <h3>🚲 ${t.transport_info}</h3>
                        <p>${detailText.split('\n').filter(p => p.includes('Transportation') || p.includes('Trasporti') || p.includes('Транспорт') || p.includes('交通')).join('\n') || detailText}</p>
                        <h3>🏄 ${t.shops_restaurants}</h3>
                        <p>${detailText.split('\n').filter(p => p.includes('Rental') || p.includes('Noleggio')|| p.includes('レンタル')|| p.includes('shop')|| p.includes('お店')).join('\n') || detailText}</p>
                        <h3>🏠 ${t.accommodations}</h3>
                        <p>${detailText.split('\n').filter(p => p.includes('Accommodation')|| p.includes('Alloggi')|| p.includes('宿泊')|| p.includes('Проживание')).join('\n') || detailText}</p>
                    </div>
                    <a class="official-link" href="${island.officialUrl}" target="_blank" rel="noopener noreferrer">🔗 ${t.official_website}</a>
                    <hr>
                    <p style="font-size:0.9rem;">※ ${t.ferry_schedule_note}<br>※1. 天候に左右されます。晴れた日に行きましょう。<br>※2. コンビニはありませんが地元のお店あります。</p>
                </div>
                <div class="footer">
                    <p><strong>${t.contact}</strong><br><a href="mailto:mementomorikatsu@gmail.com">${t.email}</a></p>
                </div>
            `;
            document.getElementById("appRoot").innerHTML = html;
            document.querySelectorAll("[data-lang]").forEach(btn => {
                btn.addEventListener("click", (e) => setLanguage(btn.getAttribute("data-lang")));
            });
            document.getElementById("darkmodeToggleBtnDetail")?.addEventListener("click", toggleTheme);
            document.getElementById("backToMainBtn")?.addEventListener("click", navigateHome);
            document.getElementById("backHistoryBtn")?.addEventListener("click", () => window.history.back());
        }

        // 航路一覧ページ
        function renderFerryList() {
            const t = translations[currentLang];
            const langButtons = [
                { code: "en", flag: "🇬🇧", label: "EN" },
                { code: "it", flag: "🇮🇹", label: "IT" },
                { code: "ru", flag: "🇷🇺", label: "RU" },
                { code: "ja", flag: "🇯🇵", label: "JA" }
            ];
            const html = `
                <div class="app-header">
                    <h1 class="title-gradient">${t.app_title}</h1>
                    <div class="controls">
                        ${langButtons.map(lang => `<button class="${currentLang === lang.code ? 'active-lang' : ''}" data-lang="${lang.code}">${lang.flag} ${lang.label}</button>`).join('')}
                        <button class="mode-toggle" id="darkmodeToggleBtnFerryList">${currentTheme === 'dark' ? '☀️ Light Mode' : '🌙 Dark Mode'}</button>
                    </div>
                </div>
                <div class="back-buttons">
                    <button id="backToMainFromList">← ${t.back_home}</button>
                </div>
                <div class="detail-section">
                    <h2>🚢 ${t.inter_island_ferries}</h2>
                    <div id="ferryItems">
                        <div class="ferry-item" data-ferry="zamami_aka">
                            <div class="ferry-title">🚤 ${t.zamami_aka_title}</div>
                            <p>${t.zamami_aka_desc}</p>
                        </div>
                        <div class="ferry-item" data-ferry="kerama_route">
                            <div class="ferry-title">⚓ ${t.kerama_route_title}</div>
                            <p>${t.kerama_route_desc}</p>
                        </div>
                    </div>
                </div>
                <div class="footer">
                    <p><strong>${t.contact}</strong><br><a href="mailto:mementomorikatsu@gmail.com">${t.email}</a></p>
                </div>
            `;
            document.getElementById("appRoot").innerHTML = html;
            document.querySelectorAll("[data-lang]").forEach(btn => {
                btn.addEventListener("click", (e) => setLanguage(btn.getAttribute("data-lang")));
            });
            document.getElementById("darkmodeToggleBtnFerryList")?.addEventListener("click", toggleTheme);
            document.getElementById("backToMainFromList")?.addEventListener("click", navigateHome);
            document.querySelectorAll(".ferry-item").forEach(item => {
                item.addEventListener("click", (e) => {
                    const ferryId = item.getAttribute("data-ferry");
                    if (ferryId) navigateToFerryDetail(ferryId);
                });
            });
        }

        // 航路詳細ページ
        function renderFerryDetail(ferryId) {
            const ferry = ferryData[ferryId];
            if (!ferry) return navigateToFerryList();
            const t = translations[currentLang];
            const langButtons = [
                { code: "en", flag: "🇬🇧", label: "EN" },
                { code: "it", flag: "🇮🇹", label: "IT" },
                { code: "ru", flag: "🇷🇺", label: "RU" },
                { code: "ja", flag: "🇯🇵", label: "JA" }
            ];
            const title = t[ferry.titleKey] || ferryId;
            const desc = t[ferry.descKey] || "";
            const html = `
                <div class="app-header">
                    <h1 class="title-gradient">${t.app_title}</h1>
                    <div class="controls">
                        ${langButtons.map(lang => `<button class="${currentLang === lang.code ? 'active-lang' : ''}" data-lang="${lang.code}">${lang.flag} ${lang.label}</button>`).join('')}
                        <button class="mode-toggle" id="darkmodeToggleBtnFerryDetail">${currentTheme === 'dark' ? '☀️ Light Mode' : '🌙 Dark Mode'}</button>
                    </div>
                </div>
                <div class="back-buttons">
                    <button id="backToFerryList">← ${t.back_to_list}</button>
                    <button id="backHomeFromFerry">← ${t.back_home}</button>
                </div>
                <div class="detail-section">
                    <h2>🚢 ${title}</h2>
                    <p>${desc}</p>
                    <hr>
                    <h3>📅 ${t.schedule_summer}</h3>
                    <pre style="white-space: pre-wrap; background: var(--bg-surface); padding: 1rem; border-radius: 1rem;">${ferry.timetable.summer}</pre>
                    <h3>❄️ ${t.schedule_winter}</h3>
                    <pre style="white-space: pre-wrap; background: var(--bg-surface); padding: 1rem; border-radius: 1rem;">${ferry.timetable.winter}</pre>
                    <h3>💰 ${t.fare_info}</h3>
                    <p>${ferry.fare}</p>
                    <h3>📞 ${t.reservation_info}</h3>
                    <p>${ferry.reservation}</p>
                    <a class="official-link" href="${ferry.officialUrl}" target="_blank" rel="noopener noreferrer">🔗 ${t.official_website_zamami}</a>
                </div>
                <div class="footer">
                    <p><strong>${t.contact}</strong><br><a href="mailto:mementomorikatsu@gmail.com">${t.email}</a></p>
                </div>
            `;
            document.getElementById("appRoot").innerHTML = html;
            document.querySelectorAll("[data-lang]").forEach(btn => {
                btn.addEventListener("click", (e) => setLanguage(btn.getAttribute("data-lang")));
            });
            document.getElementById("darkmodeToggleBtnFerryDetail")?.addEventListener("click", toggleTheme);
            document.getElementById("backToFerryList")?.addEventListener("click", navigateToFerryList);
            document.getElementById("backHomeFromFerry")?.addEventListener("click", navigateHome);
        }

        // ブラウザバック対応
        window.addEventListener("popstate", (event) => {
            const state = event.state;
            if (state && state.view === "island_detail" && state.islandId) {
                currentView = "island_detail";
                selectedIslandId = state.islandId;
                renderIslandDetail(selectedIslandId);
            } else if (state && state.view === "ferry_list") {
                currentView = "ferry_list";
                renderFerryList();
            } else if (state && state.view === "ferry_detail" && state.ferryId) {
                currentView = "ferry_detail";
                selectedFerryId = state.ferryId;
                renderFerryDetail(selectedFerryId);
            } else {
                currentView = "home";
                selectedIslandId = null;
                selectedFerryId = null;
                renderHome();
            }
        });

        // 初期化
        setTheme(currentTheme);
        renderHome();

        // Service Worker (PWA)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('SW registered: ', reg);
                }).catch(err => console.log('SW failed: ', err));
            });
        }
    </script>
</body>
</html>
